name: Bot Cron Jobs
on:
  workflow_dispatch:
  schedule:
    - cron: '20 12 * * *'   # 12:10 Алматы (UTC+5) — ТЕСТ
    - cron: '0 5 * * *'    # 10:00 Алматы — morning
    - cron: '0 8 * * *'    # 13:00 Алматы — lunch
    - cron: '0 15 * * *'   # 20:00 Алматы — evening

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Время UTC
        run: date -u

      - name: Время Алматы
        run: TZ=Asia/Almaty date

      - name: Schedule
        run: echo "Schedule = '${{ github.event.schedule }}'"

      - name: Morning TEST (12:10 Алматы)
        if: github.event.schedule == '20 12 * * *' 
        run: |
          curl -s -o /dev/null -w "HTTP статус: %{http_code}\n" https://telegram-bot-for-pubg-group.vercel.app/api/cron-morning

      - name: Morning (10:00 Алматы)
        if: github.event.schedule == '0 5 * * *'
        run: |
          curl -s -o /dev/null -w "HTTP статус: %{http_code}\n" https://telegram-bot-for-pubg-group.vercel.app/api/cron-morning

      - name: Lunch (13:00 Алматы)
        if: github.event.schedule == '0 8 * * *'
        run: |
          curl -s -o /dev/null -w "HTTP статус: %{http_code}\n" https://telegram-bot-for-pubg-group.vercel.app/api/cron-lunch

      - name: Evening (20:00 Алматы)
        if: github.event.schedule == '0 15 * * *'
        run: |
          curl -s -o /dev/null -w "HTTP статус: %{http_code}\n" https://telegram-bot-for-pubg-group.vercel.app/api/cron-evening
